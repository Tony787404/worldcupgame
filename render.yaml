services:
  - type: web
    name: world-cup-family-cards
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: node server.mjs
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: LIVE_REFRESH_MS
        value: 60000
      - key: SPORTMONKS_WORLD_CUP_LEAGUE_ID
        value: "732"
      - key: SPORTMONKS_API_TOKEN
        sync: false
      - key: THESPORTSDB_API_KEY
        sync: false
    disk:
      name: world-cup-family-cards-data
      mountPath: /var/data
      sizeGB: 1
