services:
  - type: web
    name: world-cup-family-cards
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: node server.mjs
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: AUTO_SYNC_MS
        value: 14400000
      - key: MIN_SYNC_INTERVAL_MS
        value: 3600000
      - key: MATCH_DATA_PROVIDER
        value: auto
      - key: MATCH_SYNC_DAILY_REQUEST_LIMIT
        value: 90
      - key: WORLD_CUP_DATA_URL
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: API_FOOTBALL_LEAGUE_ID
        value: "1"
      - key: API_FOOTBALL_SEASON
        value: "2026"
      - key: GEMINI_API_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: THESPORTSDB_API_KEY
        sync: false
    disk:
      name: world-cup-family-cards-data
      mountPath: /var/data
      sizeGB: 1
